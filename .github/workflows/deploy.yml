name: 🚀 Deploy to Alibaba Cloud

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 重试机制：最多尝试3次连接
      - name: Deploy (attempt 1/3)
        uses: appleboy/ssh-action@v1.2.0
        continue-on-error: true
        id: deploy1
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          command_timeout: 20m
          timeout: 22m
          script: |
            set -e
            D="/opt/apps/YP-monitor"
            
            # === 环境准备 ===
            which node >/dev/null 2>&1 || {
              echo "--- Installing Node.js ---"
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y -qq nodejs > /dev/null 2>&1
            }
            npm install -g pm2 >/dev/null 2>&1 || true
            apt-get install -y -qq nginx git > /dev/null 2>&1 || true
            
            # === 拉取代码 ===
            echo "--- Pulling code ---"
            mkdir -p /opt/apps
            if [ -d "$D/.git" ]; then cd "$D" && git fetch origin && git reset --hard origin/master; else rm -rf "$D" && git clone https://github.com/MFCR7788/YP-monitor.git "$D"; fi
            echo "[✓] Code ready"

            # === 后端构建+启动 ===
            echo "--- Building backend ---"
            cd "$D/server"
            cp -n .env.example .env 2>/dev/null || true
            npm install --production 2>&1 | tail -2
            npx prisma generate >/dev/null 2>&1
            npx prisma db push >/dev/null 2>&1 || true
            npm run build 2>&1 | tail -2
            pm2 restart yupi-server 2>/dev/null || pm2 start dist/index.js --name yupi-server
            pm2 save >/dev/null 2>&1
            echo "[✓] Backend running on :3001"

            # === 前端构建 ===
            echo "--- Building frontend ---"
            cd "$D/client"
            npm install 2>&1 | tail -2
            npx vite build 2>&1 | tail -3
            echo "[✓] Frontend built"

            # === Nginx 配置 ===
            echo "--- Configuring Nginx ---"
            cat > /etc/nginx/sites-available/ai.zjsifan.com << 'EOF'
            server {
                listen 80;
                listen [::]:80;
                server_name ai.zjsifan.com www.ai.zjsifan.com;
                root /opt/apps/YP-monitor/client/dist/;
                index index.html;

                location / {
                    try_files $uri $uri/ /index.html;
                    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ { expires 30d; add_header Cache-Control "public, immutable"; }
                }
                location /api/ { proxy_pass http://127.0.0.1:3001; proxy_http_version 1.1; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
                location /socket.io/ { proxy_pass http://127.0.0.1:3001; proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade"; proxy_read_timeout 3600s; }
            }
            EOF
            ln -sf /etc/nginx/sites-available/ai.zjsifan.com /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t >/dev/null 2>&1 && systemctl reload nginx >/dev/null 2>&1
            echo "[✓] Nginx configured"

            echo ""
            echo "========================================"
            echo "   ✅ DEPLOY SUCCESS!"
            echo "   https://ai.zjsifan.com"
            echo "========================================"

      - name: Deploy (attempt 2/3) 
        if: steps.deploy1.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        continue-on-error: true
        id: deploy2
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          command_timeout: 20m
          timeout: 22m
          script: |
            set -e
            D="/opt/apps/YP-monitor"
            which node >/dev/null 2>&1 || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y -qq nodejs >/dev/null 2>&1)
            npm install -g pm2 >/dev/null 2>&1 || true
            mkdir -p /opt/apps
            if [ -d "$D/.git" ]; then cd "$D" && git fetch origin && git reset --hard origin/master; else rm -rf "$D" && git clone https://github.com/MFCR7788/YP-monitor.git "$D"; fi
            cd "$D/server" && cp -n .env.example .env || true && npm install --production 2>&1 | tail -2 && npx prisma generate >/dev/null 2>&1 && npx prisma db push >/dev/null 2>&1 || true && npm run build 2>&1 | tail -2
            pm2 restart yupi-server 2>/dev/null || pm2 start dist/index.js --name yupi-server
            pm2 save >/dev/null 2>&1
            cd "$D/client" && npm install 2>&1 | tail -2 && npx vite build 2>&1 | tail -3
            nginx -t >/dev/null 2>&1 && systemctl reload nginx >/dev/null 2>&1
            echo "DEPLOY OK"

      - name: Deploy (attempt 3/3)
        if: steps.deploy2.outcome == 'failure'
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          command_timeout: 20m
          timeout: 22m
          script: |
            set -e
            D="/opt/apps/YP-monitor"
            which node >/dev/null 2>&1 || (curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y -qq nodejs >/dev/null 2>&1)
            npm install -g pm2 >/dev/null 2>&1 || true
            mkdir -p /opt/apps
            [ -d "$D/.git" ] && cd "$D" && git fetch origin && git reset --hard origin/master || (rm -rf "$D" && git clone https://github.com/MFCR7788/YP-monitor.git "$D")
            cd "$D/server" && cp -n .env.example .env || true && npm install --production 2>&1 | tail -2 && npx prisma generate >/dev/null 2>&1 && npm run build 2>&1 | tail -2
            pm2 restart yupi-server 2>/dev/null || pm2 start dist/index.js --name yupi-server && pm2 save >/dev/null 2>&1
            cd "$D/client" && npm install 2>&1 | tail -2 && npx vite build 2>&1 | tail -3
            nginx -t >/dev/null 2>&1 && systemctl reload nginx >/dev/null 2>&1
            echo "DEPLOY OK"

      - name: Check Result
        run: |
          if [ "${{ steps.deploy1.outcome }}" == "success" ] || [ "${{ steps.deploy2.outcome }}" == "success" ] || [ "${{ steps.deploy3.outcome }}" == "success" ]; then
            echo "🎉 Deployment succeeded!"
          else
            echo "::error::All 3 SSH attempts failed. Server may be unreachable."
            exit 1
          fi
