name: 🚀 Deploy to Alibaba Cloud

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  # === 首次初始化：安装系统环境 ===
  init:
    name: 📦 Init Server Environment
    runs-on: ubuntu-latest
    if: github.event.inputs.type == 'init'
    timeout-minutes: 30
    
    steps:
      - name: Init Server (install Node.js/Nginx/PM2/Git)
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          command_timeout: 25min
          timeout: 30min
          script: |
            set -e
            echo "[1/6] Updating apt & installing base tools..."
            apt-get update -qq
            apt-get install -y -qq curl wget git nginx certbot python3-certbot-nginx ufw > /dev/null 2>&1

            echo "[2/6] Installing Node.js 20 LTS..."
            if ! node --version 2>/dev/null | grep -q 'v20'; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash - > /dev/null 2>&1
              apt-get install -y -qq nodejs > /dev/null 2>&1
            fi
            echo "Node: $(node --version)"

            echo "[3/6] Installing PM2..."
            npm install -g pm2 > /dev/null 2>&1
            pm2 startup systemd -u root --hp /root > /dev/null 2>&1 || true
            env PATH=$PATH:/usr/bin pm2 save > /dev/null 2>&1 || true

            echo "[4/6] Cloning project..."
            mkdir -p /opt/apps
            rm -rf /opt/apps/YP-monitor
            git clone https://github.com/MFCR7788/YP-monitor.git /opt/apps/YP-monitor

            echo "[5/6] Building backend..."
            cd /opt/apps/YP-monitor/server
            cp -n .env.example .env || true
            npm install --production 2>&1 | tail -2
            npx prisma generate > /dev/null 2>&1
            npx prisma db push > /dev/null 2>&1
            npm run build 2>&1 | tail -2

            echo "[6/6] Building frontend & starting..."
            cd /opt/apps/YP-monitor/client
            npm install 2>&1 | tail -2
            npx vite build 2>&1 | tail -3

            # 启动后端
            cd /opt/apps/YP-monitor/server
            pm2 start dist/index.js --name yupi-server 2>/dev/null || pm2 restart yupi-server
            pm2 save > /dev/null 2>&1

            # Nginx 配置
            cat > /etc/nginx/sites-available/ai.zjsifan.com << 'EOF'
            server {
                listen 80;
                server_name ai.zjsifan.com www.ai.zjsifan.com;
                location / {
                    alias /opt/apps/YP-monitor/client/dist/;
                    try_files $uri $uri/ /index.html;
                    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ { expires 30d; add_header Cache-Control "public"; }
                }
                location /api/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_read_timeout 120s;
                }
                location /socket.io/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_set_header Host $host;
                    proxy_read_timeout 3600s;
                }
            }
            EOF
            ln -sf /etc/nginx/sites-available/ai.zjsifan.com /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx

            echo "=== INIT COMPLETE ==="

  # === 日常部署：拉取代码+构建+重启 ===
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    if: github.event.inputs.type != 'init' && github.event_name != 'workflow_dispatch'
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          command_timeout: 12min
          timeout: 14min
          script: |
            set -e
            echo "========================================"
            echo "   YP-Monitor Auto Deploy"
            echo "   $(date '+%Y-%m-%d %H:%M:%S')"
            echo "========================================"

            D="/opt/apps/YP-monitor"
            
            echo "--- [1] Pull code ---"
            cd "$D" && git fetch origin && git reset --hard origin/master
            echo "[✓] Code updated"

            echo "--- [2] Build backend ---"
            cd "$D/server"
            npm install --production 2>&1 | tail -2
            npx prisma generate > /dev/null 2>&1
            npx prisma db push > /dev/null 2>&1 || true
            npm run build 2>&1 | tail -2
            
            pm2 restart yupi-server || pm2 start dist/index.js --name yupi-server
            pm2 save > /dev/null 2>&1
            echo "[✓] Backend restarted (port 3001)"

            echo "--- [3] Build frontend ---"
            cd "$D/client"
            npm install 2>&1 | tail -2
            npx vite build 2>&1 | tail -3
            echo "[✓] Frontend built"

            nginx -t > /dev/null 2>&1 && systemctl reload nginx > /dev/null 2>&1
            echo "[✓] Nginx reloaded"

            echo ""
            echo "========================================"
            echo "   ✅ DEPLOY SUCCESS!"
            echo "   https://ai.zjsifan.com"
            echo "========================================"

  # === 手动触发：可选择 init 或 deploy ===
  manual:
    name: 🔧 Manual Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.type == ''
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4

      - name: Full Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          command_timeout: 18min
          timeout: 20min
          script: |
            set -e
            D="/opt/apps/YP-monitor"
            DOMAIN="ai.zjsifan.com"
            
            # 确保基础环境存在
            which node >/dev/null 2>&1 || {
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y -qq nodejs
            }
            which pm2 >/dev/null 2>&1 || npm install -g pm2
            which nginx >/dev/null 2>&1 || apt-get install -y -qq nginx
            which git >/dev/null 2>&1 || apt-get install -y -qq git

            echo "--- [Code] ---"
            mkdir -p /opt/apps
            if [ -d "$D/.git" ]; then
              cd "$D" && git fetch origin && git reset --hard origin/master
            else
              git clone https://github.com/MFCR7788/YP-monitor.git "$D"
            fi

            echo "--- [Backend] ---"
            cd "$D/server"
            cp -n .env.example .env || true
            npm install --production 2>&1 | tail -2
            npx prisma generate > /dev/null 2>&1
            npx prisma db push > /dev/null 2>&1 || true
            npm run build 2>&1 | tail -2
            pm2 restart yupi-server 2>/dev/null || pm2 start dist/index.js --name yupi-server
            pm2 save > /dev/null 2>&1

            echo "--- [Frontend] ---"
            cd "$D/client"
            npm install 2>&1 | tail -2
            npx vite build 2>&1 | tail -3

            echo "--- [Nginx] ---"
            cat > "/etc/nginx/sites-available/$DOMAIN" << 'NGX'
            server {
                listen 80; listen [::]:80;
                server_name ai.zjsifan.com www.ai.zjsifan.com;
                location / {
                    alias /opt/apps/YP-monitor/client/dist/;
                    try_files \$uri \$uri/ /index.html;
                    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ { expires 30d; add_header Cache-Control "public, immutable"; }
                }
                location /api/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_read_timeout 120s;
                }
                location /socket.io/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_read_timeout 3600s;
                }
            }
            NGX
            ln -sf "/etc/nginx/sites-available/$DOMAIN" /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t > /dev/null 2>&1 && systemctl reload nginx > /dev/null 2>&1

            echo "=== DONE === https://$DOMAIN"
