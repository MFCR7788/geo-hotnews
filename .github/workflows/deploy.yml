name: Deploy to Alibaba Cloud

on:
  push:
    branches: [ main, master ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: Setup PM2
        run: npm install -g pm2

      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USERNAME }}
          password: ${{ secrets.SERVER_PASSWORD }}
          envs: DEPLOY_PATH,POSTGRES_PASSWORD
          envs_secrets: POSTGRES_PASSWORD
          script: |
            set -e
            export DEPLOY_PATH="/www/geo-hotnews"
            export NODE_VERSION="20"

            # Clone or pull code
            if [ ! -d "$DEPLOY_PATH" ]; then
              mkdir -p $DEPLOY_PATH
              git clone https://github.com/MFCR7788/geo-hotnews.git $DEPLOY_PATH
            else
              cd $DEPLOY_PATH && git pull origin main
            fi

            # Copy production environment file
            cp $DEPLOY_PATH/server/.env.production $DEPLOY_PATH/server/.env

            # Install backend dependencies
            cd $DEPLOY_PATH/server
            npm install
            npx prisma generate
            npx prisma db push

            # Install frontend dependencies and build
            cd $DEPLOY_PATH/client
            npm install
            npm run build

            # Stop old PM2 process
            pm2 delete geo-server || true

            # Start backend with PM2
            cd $DEPLOY_PATH/server
            pm2 start npm --name "geo-server" -- start

            # Setup Nginx
            cp $DEPLOY_PATH/deploy/nginx.conf /etc/nginx/sites-available/geo-hotnews
            ln -sf /etc/nginx/sites-available/geo-hotnews /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default

            # Test and reload Nginx
            nginx -t && systemctl reload nginx

            # Save PM2 process list
            pm2 save

            echo "✅ Deployment completed successfully!"