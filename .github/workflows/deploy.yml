name: 🚀 Deploy to Alibaba Cloud

on:
  push:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        id: deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: root
          password: ${{ secrets.ALIYUN_PASSWORD }}
          command_timeout: 20m
          timeout: 22m
          script: |
            set -e
            D="/opt/apps/YP-monitor"

            # === 环境准备（幂等）===
            which node >/dev/null 2>&1 || {
              echo "--- Installing Node.js 20 LTS ---"
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y -qq nodejs > /dev/null 2>&1
            }
            npm install -g pm2 > /dev/null 2>&1 || true
            apt-get install -y -qq nginx git > /dev/null 2>&1 || true
            pm2 startup systemd -u root --hp /root > /dev/null 2>&1 || true
            echo "✅ Environment ready (Node: $(node --version))"

            # === 拉取代码 ==="
            echo "--- Pulling code ---"
            mkdir -p /opt/apps
            if [ -d "$D/.git" ]; then
              cd "$D" && git fetch origin && git reset --hard origin/master
            else
              rm -rf "$D" && git clone https://github.com/MFCR7788/YP-monitor.git "$D"
            fi
            echo "✅ Code updated"

            # === 后端构建+启动 ===
            echo "--- Building backend ---"
            cd "$D/server"
            cp -n .env.example .env 2>/dev/null || true
            npm install --production 2>&1 | tail -2
            npx prisma generate > /dev/null 2>&1
            npx prisma db push > /dev/null 2>&1 || true
            npm run build 2>&1 | tail -2
            
            pm2 restart yupi-server 2>/dev/null || \
            (cd "$D/server" && pm2 start dist/index.js --name yupi-server)
            pm2 save > /dev/null 2>&1
            echo "✅ Backend running (port 3001)"

            # === 前端构建 ===
            echo "--- Building frontend ---"
            cd "$D/client"
            npm install 2>&1 | tail -2
            npx vite build 2>&1 | tail -3
            echo "✅ Frontend built"

            # === Nginx 配置 ===
            echo "--- Configuring Nginx ---"
            cat > /etc/nginx/sites-available/ai.zjsifan.com << 'NGINX'
            server {
                listen 80;
                listen [::]:80;
                server_name ai.zjsifan.com www.ai.zjsifan.com;
                location / {
                    alias /opt/apps/YP-monitor/client/dist/;
                    try_files $uri $uri/ /index.html;
                    location ~* \.(js|css|png|jpg|ico|svg|woff2)$ {
                        expires 30d; add_header Cache-Control "public, immutable";
                    }
                }
                location /api/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_read_timeout 120s;
                }
                location /socket.io/ {
                    proxy_pass http://127.0.0.1:3001;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade $http_upgrade;
                    proxy_set_header Connection "upgrade";
                    proxy_read_timeout 3600s;
                }
            }
            NGINX
            ln -sf /etc/nginx/sites-available/ai.zjsifan.com /etc/nginx/sites-enabled/
            rm -f /etc/nginx/sites-enabled/default
            nginx -t > /dev/null 2>&1 && systemctl reload nginx > /dev/null 2>&1
            echo "✅ Nginx configured"

            echo ""
            echo "========================================"
            echo "   ✅ DEPLOY SUCCESS!"
            echo "   🌐 https://ai.zjsifan.com"
            echo "========================================"
